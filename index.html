<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor Inka — ¡Donde come uno, comen dos!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: #0b0f19; 
            color: #e2e8f0;
            line-height: 1.6;
            padding-top: 70px;
        }

        /* DISEÑO DE CABECERA */
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(180deg, #0f172a 0%, #0b0f19 100%);
        }
        
        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .lema { color: #94a3b8; font-style: italic; font-size: 0.9rem; }
        
        .zona {
            background: #1e293b;
            color: #d4af37;
            padding: 8px 15px;
            border-radius: 50px;
            margin-top: 10px;
            font-size: 0.8rem;
            border: 1px solid #d4af37;
            display: inline-block;
        }

        /* BOTÓN DE PEDIDO SUPERIOR (EL GLOBITO) */
        .cart-float {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #d4af37;
            color: #0b0f19;
            padding: 10px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(212,175,55,0.4);
            border: 2px solid #0b0f19;
            cursor: pointer;
        }
        
        .cart-count {
            background: #ef4444;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        /* TABS / PESTAÑAS */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            position: sticky;
            top: 65px;
            background: #0b0f19;
            z-index: 90;
        }
        
        .tab {
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .tab.active {
            background: #d4af37;
            color: #0b0f19;
            border-color: #d4af37;
        }

        /* MENÚ GRID */
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; display: none; }
        .container.active { display: block; }
        
        .section-title {
            color: #d4af37;
            font-size: 1.3rem;
            margin: 20px 0 15px;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            position: relative;
        }
        
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 5px; }
        .card-desc { color: #94a3b8; font-size: 0.8rem; margin-bottom: 10px; height: 40px; overflow: hidden; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .price { color: #d4af37; font-size: 1.2rem; font-weight: 800; }
        
        .btn-add {
            background: #d4af37;
            color: #0b0f19;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* MODAL Y FORMULARIO */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }

        .btn-whatsapp { background: #25d366; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        /* MENÚ EJECUTIVO */
        .menu-dia { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #0f172a; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #d4af37; }
        .badge { position: absolute; top: 10px; right: 10px; background: #d4af37; color: #0b0f19; padding: 4px 8px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; }

        .footer { text-align: center; padding: 30px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="cart-float" onclick="toggleCart()">
        <span>🛒 Ver mi pedido</span>
        <span class="cart-count" id="cartCount">0</span>
    </div>

    <div class="header">
        <div class="logo">🇵🇪 Sabor Inka</div>
        <p class="lema">"Donde come uno, comen dos"</p>
        <div class="zona">🛵 Delivery: Santa Brígida • San Miguel • Trujui</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('especiales')">🔥 Especiales</button>
        <button class="tab" onclick="showTab('ejecutivo')">🏭 Menú Fábrica</button>
    </div>

    <div class="modal-overlay" id="cartModal">
        <div class="modal">
            <h2 style="color:#d4af37; margin-bottom:15px;">Tu Pedido</h2>
            <div id="cartItems"></div>
            <div id="totalPrice" style="text-align:center; font-size:1.4rem; color:#d4af37; font-weight:bold; padding:15px;">Total: $0</div>
            
            <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
            <div class="form-group"><label>Dirección</label><input type="text" id="direccion"></div>
            <div class="form-group">
                <label>Pago</label>
                <select id="pago"><option>Efectivo</option><option>Transferencia / Mercado Pago</option></select>
            </div>
            <button class="btn-whatsapp" onclick="sendOrder()">📲 ENVIAR POR WHATSAPP</button>
            <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:10px;">Cerrar</button>
        </div>
    </div>

    <div class="container active" id="tab-especiales">
        <h2 class="section-title">🍗 Pollo a la Brasa</h2>
        <div class="grid" id="menuPolloBrasa"></div>
        <h2 class="section-title">🔥 Platos Abundantes</h2>
        <div class="grid" id="menuAbundantes"></div>
        <h2 class="section-title">🍽️ Platos Individuales</h2>
        <div class="grid" id="menuIndividuales"></div>
    </div>

    <div class="container" id="tab-ejecutivo">
        <div id="menuEjecutivo"></div>
    </div>

    <div class="footer">
        <p>Sabor Inka © 2026</p>
        <p>WhatsApp: +54 9 11 6790-9625</p>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5491167909625"; 

        const menuData = {
            polloBrasa: [
                { id: "p1", nombre: "1/4 Pollo a la Brasa", desc: "Con papas, ensalada y cremas", precio: 10000, img: "https://jameaperu.com/wp-content/uploads/2019/08/pollo-a-la-brasa_700x465.jpg" },
                { id: "p2", nombre: "1/2 Pollo a la Brasa", desc: "Con papas y ensalada. Comen 2", precio: 20000, img: "https://jameaperu.com/wp-content/uploads/2019/08/pollo-a-la-brasa_700x465.jpg", badge: "🍴 COMEN 2" },
                { id: "p3", nombre: "Pollo Entero", desc: "Papas XL y Ensalada. Comen 4-5", precio: 35000, img: "https://jameaperu.com/wp-content/uploads/2019/08/pollo-a-la-brasa_700x465.jpg", badge: "🍴 COMEN 5" }
            ],
            abundantes: [
                { id: "a1", nombre: "Lomo Saltado Gigante", desc: "Carne salteada, papas y arroz", precio: 9500, img: "https://comedera.com/wp-content/uploads/2022/05/lomo-saltado-peruano.jpg", badge: "🔥 TOP" },
                { id: "a2", nombre: "Arroz Chaufa Pollo", desc: "Clásico peruano. Porción XL", precio: 15000, img: "https://www.laylita.com/recetas/wp-content/uploads/Arroz-chaufa-de-pollo.jpg", badge: "🍴 COMEN 2" }
            ],
            individuales: [
                { id: "i1", nombre: "Ceviche Mixto", desc: "Pescado fresco y mariscos", precio: 20000, img: "https://es.cravingsjournal.com/wp-content/uploads/2019/07/ceviche-peruano-1.jpg" },
                { id: "i2", nombre: "Jalea Mixta", desc: "Fritura de mariscos y pescado", precio: 20000, img: "https://comedera.com/wp-content/uploads/2022/06/jalea-mixta.jpg" }
            ]
        };

        const menuEjecutivo = [
            { dia: "Lunes", plato: "Tallarines con Huancaína", precio: 8500 },
            { dia: "Martes", plato: "Estofado de Pollo", precio: 8500 },
            { dia: "Miércoles", plato: "Arroz con Bistec", precio: 9000 },
            { dia: "Jueves", plato: "Lomo Saltado Simple", precio: 9500 },
            { dia: "Viernes", plato: "Papa a la Huancaína Especial", precio: 8000 }
        ];

        let cart = {};

        function render() {
            const card = (i) => `
                <div class="card">
                    ${i.badge ? `<div class="badge">${i.badge}</div>` : ''}
                    <img src="${i.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x200?text=Sabor+Inka'">
                    <div class="card-body">
                        <h3 class="card-title">${i.nombre}</h3>
                        <p class="card-desc">${i.desc}</p>
                        <div class="card-footer">
                            <span class="price">$${i.precio}</span>
                            <button class="btn-add" onclick="add('${i.id}','${i.nombre}',${i.precio})">＋</button>
                        </div>
                    </div>
                </div>`;
            
            document.getElementById('menuPolloBrasa').innerHTML = menuData.polloBrasa.map(card).join('');
            document.getElementById('menuAbundantes').innerHTML = menuData.abundantes.map(card).join('');
            document.getElementById('menuIndividuales').innerHTML = menuData.individuales.map(card).join('');
            
            document.getElementById('menuEjecutivo').innerHTML = menuEjecutivo.map(i => `
                <div class="menu-dia">
                    <span><b>${i.dia}:</b> ${i.plato}</span>
                    <button class="btn-add" onclick="add('${i.dia}','Menú ${i.dia}',${i.precio})">$${i.precio} ＋</button>
                </div>`).join('');
        }

        function add(id, n, p) {
            if(cart[id]) cart[id].q++;
            else cart[id] = { n, p, q: 1 };
            update();
        }

        function update() {
            const items = Object.values(cart);
            document.getElementById('cartCount').textContent = items.reduce((s,i)=>s+i.q, 0);
            document.getElementById('totalPrice').textContent = "Total: $" + items.reduce((s,i)=>s+(i.p*i.q), 0);
            document.getElementById('cartItems').innerHTML = items.map(i => `
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #334155;">
                    <span>${i.q}x ${i.n}</span>
                    <span>$${i.p*i.q}</span>
                </div>`).join('');
        }

        function sendOrder() {
            const n = document.getElementById('nombre').value;
            const d = document.getElementById('direccion').value;
            if(!n || !d) return alert("Faltan datos");
            let t = `*NUEVO PEDIDO - SABOR INKA*\n\n*Cliente:* ${n}\n*Dir:* ${d}\n\n*Detalle:*\n`;
            Object.values(cart).forEach(i => t += `- ${i.q}x ${i.n}\n`);
            t += `\n*${document.getElementById('totalPrice').textContent}*`;
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(t)}`);
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('active'); }
        function showTab(t) {
            document.querySelectorAll('.container, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            event.target.classList.add('active');
        }

        render();
    </script>
</body>
</html>

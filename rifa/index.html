<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏘️ Calle Solano - Barrio Las Catalinas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --verde: #22c55e;
            --amarillo: #eab308;
            --rojo: #ef4444;
            --azul: #3b82f6;
            --morado: #8b5cf6;
            --fondo: #0f172a;
            --card: #1e293b;
            --whatsapp: #25d366;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--fondo);
            color: #e2e8f0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }
        .login-logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        .login-title {
            font-size: 1.8rem;
            color: var(--verde);
            text-align: center;
        }
        .login-subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 20px;
        }
        .login-form {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .login-form label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .login-form input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .login-form input:focus {
            border-color: var(--verde);
        }
        .btn-login {
            background: var(--verde);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:active {
            transform: scale(0.97);
        }

        /* App Screen */
        .app-screen {
            display: none;
            min-height: 100vh;
        }
        .app-screen.active {
            display: block;
        }

        /* Header */
        .app-header {
            background: var(--card);
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .app-title {
            font-size: 1.2rem;
            color: var(--verde);
        }
        .user-info {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--fondo);
            border-bottom: 1px solid #334155;
            overflow-x: auto;
            position: sticky;
            top: 53px;
            z-index: 99;
        }
        .tab {
            background: var(--card);
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--verde);
            color: white;
            border-color: var(--verde);
        }
        .tab:active {
            transform: scale(0.95);
        }

        /* Content */
        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            display: none;
        }
        .content.active {
            display: block;
        }

        /* Chat */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            background: var(--card);
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
        }
        .chat-message.mine {
            align-self: flex-end;
            background: var(--verde);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-message.other {
            align-self: flex-start;
            background: #334155;
            color: #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .chat-message .author {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-bottom: 4px;
        }
        .chat-message .time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #0f172a;
            border-top: 1px solid #334155;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .chat-input:focus {
            border-color: var(--verde);
        }
        .btn-send {
            background: var(--verde);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-send:active {
            transform: scale(0.95);
        }

        /* Anuncios */
        .anuncios-grid {
            display: grid;
            gap: 12px;
        }
        .anuncio-card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #334155;
        }
        .anuncio-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        .anuncio-categoria {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .cat-vendo { background: rgba(34,197,94,0.2); color: var(--verde); }
        .cat-compro { background: rgba(59,130,246,0.2); color: var(--azul); }
        .cat-servicios { background: rgba(139,92,246,0.2); color: var(--morado); }
        .cat-eventos { background: rgba(234,179,8,0.2); color: var(--amarillo); }
        .cat-avisos { background: rgba(100,116,139,0.2); color: #94a3b8; }
        .cat-emergencia { background: rgba(239,68,68,0.2); color: var(--rojo); }

        .anuncio-titulo {
            font-size: 1.1rem;
            color: white;
            margin-bottom: 6px;
        }
        .anuncio-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .anuncio-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #64748b;
        }
        .anuncio-contacto {
            background: var(--whatsapp);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .btn-nuevo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--verde);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-nuevo:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #334155;
        }
        .modal h3 {
            color: var(--verde);
            margin-bottom: 16px;
            font-size: 1.2rem;
        }
        .modal label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .modal input, .modal textarea, .modal select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            margin-bottom: 14px;
            font-size: 1rem;
            outline: none;
        }
        .modal input:focus, .modal textarea:focus, .modal select:focus {
            border-color: var(--verde);
        }
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-success { background: var(--verde); color: white; }
        .btn-dark { background: #334155; color: white; }

        /* Fotos */
        .fotos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .foto-card {
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: var(--card);
            border: 1px solid #334155;
        }
        .foto-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Admin hint */
        .admin-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(51,65,85,0.5);
            color: rgba(148,163,184,0.4);
            font-size: 1rem;
            cursor: pointer;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--verde);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 300;
            animation: slideUp 0.3s ease;
            white-space: nowrap;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
        }

        @media (min-width: 768px) {
            .fotos-grid { grid-template-columns: repeat(3, 1fr); }
            .chat-message { max-width: 60%; }
        }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
    <div class="login-logo">🏘️</div>
    <h1 class="login-title">Calle Solano</h1>
    <p class="login-subtitle">Barrio Las Catalinas<br>Conectá con tus vecinos</p>
    
    <div class="login-form">
        <label>👤 ¿Cómo te llamás?</label>
        <input type="text" id="loginNombre" placeholder="Ej: Juan Pérez" autocomplete="off">
        
        <label>🏠 ¿En qué número vivís?</label>
        <input type="text" id="loginDireccion" placeholder="Ej: 1234" autocomplete="off">
        
        <button class="btn-login" onclick="entrar()">🚀 Entrar al barrio</button>
    </div>
</div>

<!-- APP SCREEN -->
<div class="app-screen" id="appScreen">
    <div class="app-header">
        <div class="app-header-content">
            <div class="app-title">🏘️ Calle Solano</div>
            <div class="user-info" id="userInfo"></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('chat')">💬 Chat</button>
        <button class="tab" onclick="showTab('anuncios')">📋 Anuncios</button>
        <button class="tab" onclick="showTab('fotos')">📷 Fotos</button>
        <button class="tab" onclick="showTab('seguridad')">🛡️ Seguridad</button>
    </div>

    <!-- CHAT -->
    <div class="content active" id="tab-chat">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Escribí un mensaje..." onkeypress="if(event.key==='Enter') enviarMensaje()">
                <button class="btn-send" onclick="enviarMensaje()">➤</button>
            </div>
        </div>
    </div>

    <!-- ANUNCIOS -->
    <div class="content" id="tab-anuncios">
        <div class="anuncios-grid" id="anunciosGrid"></div>
        <button class="btn-nuevo" onclick="abrirModalAnuncio()">➕</button>
    </div>

    <!-- FOTOS -->
    <div class="content" id="tab-fotos">
        <div class="fotos-grid" id="fotosGrid"></div>
        <button class="btn-nuevo" onclick="abrirModalFoto()">📷</button>
    </div>

    <!-- SEGURIDAD -->
    <div class="content" id="tab-seguridad">
        <div style="text-align:center; padding:40px 20px; color:#94a3b8;">
            <div style="font-size:4rem; margin-bottom:20px;">🛡️</div>
            <h2 style="color:var(--verde); margin-bottom:10px;">Centro de Seguridad</h2>
            <p>Próximamente: Cámaras de vigilancia 24/7</p>
            <p style="margin-top:20px; font-size:0.85rem;">Mientras tanto, usá el chat para alertar a los vecinos</p>
        </div>
    </div>
</div>

<!-- MODAL NUEVO ANUNCIO -->
<div class="modal-overlay" id="modalAnuncio">
    <div class="modal">
        <h3>📋 Nuevo Anuncio</h3>
        <label>Título</label>
        <input type="text" id="anuncioTitulo" placeholder="Ej: Vendo bicicleta">
        
        <label>Categoría</label>
        <select id="anuncioCategoria">
            <option value="vendo">🏷️ Vendo</option>
            <option value="compro">🔍 Compro</option>
            <option value="servicios">🛠️ Servicios</option>
            <option value="eventos">📅 Eventos</option>
            <option value="avisos">📢 Avisos</option>
            <option value="emergencia">🚨 Emergencia</option>
        </select>
        
        <label>Descripción</label>
        <textarea id="anuncioDesc" placeholder="Describí tu anuncio..."></textarea>
        
        <label>Teléfono (opcional)</label>
        <input type="tel" id="anuncioTelefono" placeholder="11 1234-5678">
        
        <div class="modal-actions">
            <button class="btn btn-success" onclick="publicarAnuncio()">📢 Publicar</button>
            <button class="btn btn-dark" onclick="cerrarModal('modalAnuncio')">❌ Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL NUEVA FOTO -->
<div class="modal-overlay" id="modalFoto">
    <div class="modal">
        <h3>📷 Subir Foto</h3>
        <label>Link de la foto (URL)</label>
        <input type="url" id="fotoUrl" placeholder="https://...">
        <p style="color:#64748b; font-size:0.8rem; margin-bottom:14px;">💡 Subí la foto a Imgur o similar y pegá el link</p>
        
        <label>Descripción</label>
        <input type="text" id="fotoDesc" placeholder="Ej: Fiesta del barrio 2026">
        
        <div class="modal-actions">
            <button class="btn btn-success" onclick="subirFoto()">📷 Subir</button>
            <button class="btn btn-dark" onclick="cerrarModal('modalFoto')">❌ Cancelar</button>
        </div>
    </div>
</div>

<!-- ADMIN LOGIN -->
<div class="modal-overlay" id="modalAdmin">
    <div class="modal">
        <h3>🔐 Panel Admin</h3>
        <label>Clave de administrador</label>
        <input type="password" id="adminClave" placeholder="••••••••">
        <div class="modal-actions">
            <button class="btn btn-success" onclick="verificarAdmin()">🔓 Entrar</button>
            <button class="btn btn-dark" onclick="cerrarModal('modalAdmin')">❌ Cancelar</button>
        </div>
    </div>
</div>

<button class="admin-hint" onclick="abrirModal('modalAdmin')">⚙️</button>

<script>
const CLAVE_ADMIN = 'solano2024';
const DATOS_URL = 'datos.json';
const WHATSAPP_GROUP = 'https://chat.whatsapp.com/I71TyME1nTjGPhF28w0SZX';

let usuario = null;
let datos = { chat: [], anuncios: [] };
let esAdmin = false;

document.addEventListener('DOMContentLoaded', function() {
    const guardado = localStorage.getItem('calle_solano_user');
    if (guardado) {
        usuario = JSON.parse(guardado);
        mostrarApp();
    }
    cargarDatos();
    
    document.getElementById('loginNombre').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') document.getElementById('loginDireccion').focus();
    });
    document.getElementById('loginDireccion').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') entrar();
    });
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
    });
});

function entrar() {
    const nombre = document.getElementById('loginNombre').value.trim();
    const direccion = document.getElementById('loginDireccion').value.trim();
    
    if (!nombre) {
        toast('❌ Ingresá tu nombre');
        return;
    }
    if (!direccion) {
        toast('❌ Ingresá tu dirección');
        return;
    }
    
    usuario = { nombre, direccion };
    localStorage.setItem('calle_solano_user', JSON.stringify(usuario));
    mostrarApp();
}

function mostrarApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').classList.add('active');
    document.getElementById('userInfo').textContent = `${usuario.nombre} (${usuario.direccion})`;
    cargarDatos();
}

function showTab(tabName) {
    document.querySelectorAll('.content, .tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.add('active');
    event.target.classList.add('active');
}

async function cargarDatos() {
    try {
        const response = await fetch(DATOS_URL + '?t=' + Date.now());
        datos = await response.json();
        renderChat();
        renderAnuncios();
        renderFotos();
    } catch (e) {
        console.error('Error cargando datos:', e);
        toast('⚠️ Error al cargar datos');
    }
}

function renderChat() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    
    datos.chat.forEach(msg => {
        const isMine = msg.autor === usuario.nombre && msg.direccion === usuario.direccion;
        const div = document.createElement('div');
        div.className = `chat-message ${isMine ? 'mine' : 'other'}`;
        
        const time = new Date(msg.timestamp).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
        
        div.innerHTML = `
            <div class="author">${msg.autor} (${msg.direccion})</div>
            <div>${escapeHtml(msg.texto)}</div>
            <div class="time">${time}</div>
        `;
        container.appendChild(div);
    });
    
    container.scrollTop = container.scrollHeight;
}

function enviarMensaje() {
    const input = document.getElementById('chatInput');
    const texto = input.value.trim();
    
    if (!texto) return;
    if (!usuario) {
        toast('❌ Tenés que iniciar sesión');
        return;
    }
    
    const nuevoMensaje = {
        id: Date.now(),
        autor: usuario.nombre,
        direccion: usuario.direccion,
        texto: texto,
        foto: null,
        timestamp: new Date().toISOString()
    };
    
    datos.chat.push(nuevoMensaje);
    input.value = '';
    renderChat();
    guardarDatos();
    
    // Simular que se guarda (en realidad hay que editar el JSON en GitHub)
    toast('💬 Mensaje enviado (se verá al recargar)');
}

function renderAnuncios() {
    const container = document.getElementById('anunciosGrid');
    container.innerHTML = '';
    
    const ahora = new Date();
    const anunciosActivos = datos.anuncios.filter(a => new Date(a.expira) > ahora);
    
    if (anunciosActivos.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">No hay anuncios activos</div>';
        return;
    }
    
    anunciosActivos.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    
    anunciosActivos.forEach(ad => {
        const div = document.createElement('div');
        div.className = 'anuncio-card';
        
        const time = new Date(ad.timestamp).toLocaleDateString('es-AR');
        const catClass = 'cat-' + ad.categoria;
        
        div.innerHTML = `
            <div class="anuncio-header">
                <span class="anuncio-categoria ${catClass}">${ad.categoria}</span>
                <span style="color:#64748b; font-size:0.75rem;">${time}</span>
            </div>
            <div class="anuncio-titulo">${escapeHtml(ad.titulo)}</div>
            <div class="anuncio-desc">${escapeHtml(ad.descripcion)}</div>
            <div class="anuncio-footer">
                <span>${ad.autor} (${ad.direccion})</span>
                ${ad.telefono ? `<a href="https://wa.me/54${ad.telefono.replace(/\D/g,'')}" class="anuncio-contacto" target="_blank">📱 Contactar</a>` : ''}
            </div>
        `;
        container.appendChild(div);
    });
}

function abrirModalAnuncio() {
    if (!usuario) {
        toast('❌ Tenés que iniciar sesión');
        return;
    }
    document.getElementById('anuncioTitulo').value = '';
    document.getElementById('anuncioCategoria').value = 'vendo';
    document.getElementById('anuncioDesc').value = '';
    document.getElementById('anuncioTelefono').value = '';
    abrirModal('modalAnuncio');
}

function publicarAnuncio() {
    const titulo = document.getElementById('anuncioTitulo').value.trim();
    const categoria = document.getElementById('anuncioCategoria').value;
    const descripcion = document.getElementById('anuncioDesc').value.trim();
    const telefono = document.getElementById('anuncioTelefono').value.trim();
    
    if (!titulo || !descripcion) {
        toast('❌ Completá título y descripción');
        return;
    }
    
    const nuevoAnuncio = {
        id: Date.now(),
        titulo,
        categoria,
        descripcion,
        fotos: [],
        telefono,
        autor: usuario.nombre,
        direccion: usuario.direccion,
        timestamp: new Date().toISOString(),
        expira: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
    };
    
    datos.anuncios.push(nuevoAnuncio);
    renderAnuncios();
    cerrarModal('modalAnuncio');
    guardarDatos();
    toast('📢 Anuncio publicado');
}

function renderFotos() {
    const container = document.getElementById('fotosGrid');
    container.innerHTML = '';
    
    // Fotos de anuncios y chat
    const fotos = [];
    datos.anuncios.forEach(ad => {
        if (ad.fotos && ad.fotos.length > 0) {
            ad.fotos.forEach(foto => {
                fotos.push({ url: foto, desc: ad.titulo });
            });
        }
    });
    
    if (fotos.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">No hay fotos aún</div>';
        return;
    }
    
    fotos.forEach(f => {
        const div = document.createElement('div');
        div.className = 'foto-card';
        div.innerHTML = `<img src="${f.url}" alt="${escapeHtml(f.desc)}" onerror="this.style.display='none'">`;
        container.appendChild(div);
    });
}

function abrirModalFoto() {
    if (!usuario) {
        toast('❌ Tenés que iniciar sesión');
        return;
    }
    document.getElementById('fotoUrl').value = '';
    document.getElementById('fotoDesc').value = '';
    abrirModal('modalFoto');
}

function subirFoto() {
    const url = document.getElementById('fotoUrl').value.trim();
    const desc = document.getElementById('fotoDesc').value.trim();
    
    if (!url) {
        toast('❌ Pegá el link de la foto');
        return;
    }
    
    // Agregar como anuncio con foto
    const nuevoAnuncio = {
        id: Date.now(),
        titulo: desc || 'Foto del barrio',
        categoria: 'avisos',
        descripcion: desc || 'Foto compartida por un vecino',
        fotos: [url],
        telefono: '',
        autor: usuario.nombre,
        direccion: usuario.direccion,
        timestamp: new Date().toISOString(),
        expira: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
    };
    
    datos.anuncios.push(nuevoAnuncio);
    renderFotos();
    renderAnuncios();
    cerrarModal('modalFoto');
    guardarDatos();
    toast('📷 Foto subida');
}

function abrirModal(id) {
    document.getElementById(id).classList.add('active');
}

function cerrarModal(id) {
    document.getElementById(id).classList.remove('active');
}

function verificarAdmin() {
    const clave = document.getElementById('adminClave').value.trim();
    if (clave === CLAVE_ADMIN) {
        esAdmin = true;
        cerrarModal('modalAdmin');
        toast('🔓 Modo admin activado');
    } else {
        toast('❌ Clave incorrecta');
    }
}

function guardarDatos() {
    // En un entorno real, esto guardaría en el servidor
    // Por ahora, los datos se mantienen en memoria hasta recargar
    console.log('Datos actualizados:', datos);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { if (t.parentNode) t.remove(); }, 2500);
}
</script>
</body>
</html>
